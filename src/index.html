<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YourSound — CK-1</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">

    <!-- TOP BAR -->
    <header class="topbar">
      <div class="topbar-left">
        <div class="logo-badge">YS</div>
        <div class="logo-text-group">
          <span class="logo-name">YourSound</span>
          <span class="logo-sub">CREATIVE KONSOLES · CK-1</span>
        </div>
      </div>
      <div class="topbar-ck-label">
        <span>CREATIVE<br>KONSOLES</span>
        <span class="ck-dot">· CK-1</span>
      </div>
      <div class="topbar-center">
        <input class="preset-input" id="presetInput" type="text" value="Podcast – Stereo Mix" spellcheck="false" />
      </div>
      <div class="topbar-right">
        <span class="status-badge-text" id="statusBadge">STANDBY</span>
        <span class="power-led" id="powerLed"></span>
      </div>
    </header>

    <!-- MAIN LAYOUT -->
    <div class="main-layout">

      <!-- LEFT PANEL -->
      <aside class="panel panel-left">

        <div class="section">
          <div class="section-label">SOURCES</div>
          <div class="source-list">
            <div class="source-row active" id="src-sys">
              <span class="source-dot" style="background:#7c4dff; box-shadow:0 0 6px #7c4dff88"></span>
              <span class="source-name">System Audio</span>
              <label class="toggle">
                <input type="checkbox" id="toggle-sys" checked>
                <span class="toggle-track"></span>
              </label>
            </div>
            <div class="source-row active" id="src-mic">
              <span class="source-dot" style="background:#448aff; box-shadow:0 0 6px #448aff88"></span>
              <span class="source-name">Microphone</span>
              <label class="toggle">
                <input type="checkbox" id="toggle-mic" checked>
                <span class="toggle-track"></span>
              </label>
            </div>
            <div class="source-row" id="src-cam">
              <span class="source-dot" style="background:#18ffcf; opacity:0.3"></span>
              <span class="source-name">Camera</span>
              <label class="toggle">
                <input type="checkbox" id="toggle-cam">
                <span class="toggle-track"></span>
              </label>
            </div>
            <div class="source-row" id="src-scr">
              <span class="source-dot" style="background:#ff6b35; opacity:0.3"></span>
              <span class="source-name">Screen</span>
              <label class="toggle">
                <input type="checkbox" id="toggle-scr">
                <span class="toggle-track"></span>
              </label>
            </div>
          </div>
        </div>

        <div class="section">
          <div class="section-label">INPUT GAIN</div>
          <div class="knob-group">
            <div class="knob-row">
              <span class="knob-label">SYS</span>
              <canvas class="knob" id="knob-sys" width="56" height="56" data-value="75"></canvas>
              <span class="knob-value" id="val-sys">75</span>
            </div>
            <div class="knob-row">
              <span class="knob-label">MIC</span>
              <canvas class="knob" id="knob-mic" width="56" height="56" data-value="82"></canvas>
              <span class="knob-value" id="val-mic">82</span>
            </div>
            <div class="knob-row">
              <span class="knob-label">MIX</span>
              <canvas class="knob" id="knob-mix" width="56" height="56" data-value="60"></canvas>
              <span class="knob-value" id="val-mix">60</span>
            </div>
          </div>
        </div>

        <div class="section">
          <div class="section-label">DEVICE</div>
          <div class="device-list" id="deviceList">
            <div class="device-item selected">Focusrite Clarett 2Pre</div>
            <div class="device-item">FaceTime HD Camera</div>
          </div>
        </div>

      </aside>

      <!-- CENTER PANEL -->
      <main class="panel panel-center">
        <canvas class="spatial-canvas" id="spatialCanvas"></canvas>
        <video class="cam-preview" id="camPreview" autoplay muted playsinline></video>
        <div class="cam-label" id="camLabel">CAMERA</div>
        <div class="input-monitor-bar">
          <div class="monitor-label-vert">INPUT<br>MONITOR</div>
          <canvas class="waveform-canvas" id="waveformCanvas"></canvas>
          <div class="transport-group">
            <div class="timer mono" id="timer">00:00:00</div>
            <span class="ready-label mono" id="readyLabel">READY</span>
          </div>
        </div>
      </main>

      <!-- RIGHT PANEL -->
      <aside class="panel panel-right">

        <div class="vu-section">
          <div class="section-label">STEREO LEVELS</div>
          <div class="vu-wrap">
            <div class="vu-col" id="vuLeft"></div>
            <div class="vu-col" id="vuRight"></div>
          </div>
          <div class="vu-labels">
            <span>L</span><span>R</span>
          </div>
        </div>

        <div class="clip-bar" id="clipBar">
          <span>CLIP</span>
          <span class="clip-dot" id="clipDot"></span>
        </div>

        <div class="record-section">
          <div class="section-label">RECORD</div>
          <div class="record-btn-wrap">
            <button class="record-btn" id="recordBtn">
              <div class="record-ring" id="recordRing"></div>
              <div class="record-icon" id="recordIcon"></div>
            </button>
          </div>
          <div class="record-status-labels">
            <span class="rec-text">RECORD</span>
            <span class="standby-text mono" id="standbyLabel">STANDBY</span>
          </div>
        </div>

        <button class="save-btn" id="saveBtn">
          <span class="save-arrow">↓</span> SAVE<br>FILE
        </button>

      </aside>
    </div>
  </div>

  <script src="main.js" type="module"></script>
</body>
</html>
